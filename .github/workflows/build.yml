name: Build
on:
  push:
  pull_request:
  schedule:
    # Keep dependency caches warm; GitHub evicts caches that are not accessed.
    - cron: 0 0 */5 * *

# Automatically cancel previous runs of this workflow on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    # Skip building pull requests from the same repository
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) }}
    runs-on: ubuntu-22.04
    steps:
        - name: Checkout
          uses: actions/checkout@v5
          with:
            submodules: recursive

        - name: Hash dependencies
          id: hash-dependencies
          run: python dependencies/hash.py --debug >> "$GITHUB_OUTPUT"
          shell: bash

        - name: Cache dependencies
          id: cache-dependencies
          uses: actions/cache@v5
          with:
            path: dependencies/install
            key: dependencies-${{ runner.os }}-${{ runner.arch }}-${{ steps.hash-dependencies.outputs.file_hash }}
            restore-keys: |
              dependencies-${{ runner.os }}-${{ runner.arch }}-${{ steps.hash-dependencies.outputs.restore_hash }}

        - name: Build dependencies
          if: steps.cache-dependencies.outputs.cache-hit != 'true'
          run: |
            cmake -G Ninja -S dependencies -B dependencies/build -DCMAKE_BUILD_TYPE=Release
            cmake --build dependencies/build

        - name: Build project
          run: |
            cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo \
              "-DCMAKE_C_COMPILER=$PWD/dependencies/install/bin/clang" \
              "-DCMAKE_CXX_COMPILER=$PWD/dependencies/install/bin/clang++"
            cmake --build build

        - name: Run smoke tests
          run: |
            ctest --test-dir build --output-on-failure --timeout 30

  macos:
    # Skip building pull requests from the same repository
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) }}
    runs-on: macos-latest
    steps:
        - name: Checkout
          uses: actions/checkout@v6
          with:
            submodules: recursive

        - name: Hash dependencies
          id: hash-dependencies
          run: python dependencies/hash.py --debug >> "$GITHUB_OUTPUT"
          shell: bash

        - name: Cache dependencies
          id: cache-dependencies
          uses: actions/cache@v5
          with:
            path: dependencies/install
            key: dependencies-${{ runner.os }}-${{ runner.arch }}-${{ steps.hash-dependencies.outputs.file_hash }}
            restore-keys: |
              dependencies-${{ runner.os }}-${{ runner.arch }}-${{ steps.hash-dependencies.outputs.restore_hash }}

        - name: Build dependencies
          if: steps.cache-dependencies.outputs.cache-hit != 'true'
          run: |
            cmake -G Ninja -S dependencies -B dependencies/build -DCMAKE_BUILD_TYPE=Release
            cmake --build dependencies/build

        - name: Build project
          run: |
            cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo \
              "-DCMAKE_C_COMPILER=$PWD/dependencies/install/bin/clang" \
              "-DCMAKE_CXX_COMPILER=$PWD/dependencies/install/bin/clang++"
            cmake --build build

        - name: Run smoke tests
          run: |
            ctest --test-dir build --output-on-failure --timeout 30

  windows:
    # Skip building pull requests from the same repository
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) }}
    runs-on: windows-latest
    steps:
        - name: Setup MSVC
          if: runner.os == 'Windows'
          uses: TheMrMilchmann/setup-msvc-dev@79dac248aac9d0059f86eae9d8b5bfab4e95e97c # v4.0.0
          with:
            arch: x64

        - name: Checkout
          uses: actions/checkout@v6
          with:
            submodules: recursive

        - name: Hash dependencies
          id: hash-dependencies
          run: python dependencies/hash.py --debug >> "$GITHUB_OUTPUT"
          shell: bash

        - name: Cache dependencies
          id: cache-dependencies
          uses: actions/cache@v5
          with:
            path: dependencies/install
            key: dependencies-${{ runner.os }}-${{ runner.arch }}-${{ steps.hash-dependencies.outputs.file_hash }}
            restore-keys: |
              dependencies-${{ runner.os }}-${{ runner.arch }}-${{ steps.hash-dependencies.outputs.restore_hash }}

        - name: Build dependencies
          if: steps.cache-dependencies.outputs.cache-hit != 'true'
          run: |
            cmake -G Ninja -S dependencies -B dependencies/build -DCMAKE_BUILD_TYPE=Release
            cmake --build dependencies/build
          shell: pwsh

        - name: Build project
          run: |
            cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo `
              "-DCMAKE_C_COMPILER=$PWD/dependencies/install/bin/clang-cl.exe" `
              "-DCMAKE_CXX_COMPILER=$PWD/dependencies/install/bin/clang-cl.exe"
            cmake --build build
          shell: pwsh

        - name: Run smoke tests
          run: |
            ctest --test-dir build --output-on-failure --timeout 30
          shell: pwsh
